<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>GYMBRO</title>
<meta name="theme-color" content="#FC5200">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GYMBRO">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<style>
:root {
  --orange: #FC5200;
  --orange-dark: #D94700;
  --orange-pale: #FFEDE3;
  --ink: #242428;
  --ink-2: #6D6D78;
  --ink-3: #9B9BA6;
  --bg: #F5F5F7;
  --card: #FFFFFF;
  --line: #E8E8EC;
  --green: #2E9E44;
  --red: #D9403A;
  --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--ink);
  padding-bottom: calc(74px + env(safe-area-inset-bottom));
}
body.no-scroll { overflow: hidden; }
#view { max-width: 560px; margin: 0 auto; padding: 14px 16px 24px; }

.top { display: flex; align-items: baseline; justify-content: space-between; padding: 10px 2px 16px; }
.logo { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--orange); }
.top-date { font-size: 13px; color: var(--ink-2); text-transform: capitalize; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.lead { font-size: 15px; color: var(--ink-2); margin: 0 2px 14px; line-height: 1.45; }

.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
  box-shadow: 0 1px 2px rgba(20,20,30,0.05);
}
.card-kicker { font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
.section-title { font-size: 17px; font-weight: 700; margin: 22px 2px 10px; }
.section-sub { font-size: 12px; font-weight: 500; color: var(--ink-3); margin-left: 6px; }
.hint { font-size: 12.5px; color: var(--ink-3); margin-top: 10px; line-height: 1.4; }
.hint-inline { font-size: 12.5px; color: var(--ink-3); }

.btn-primary {
  background: var(--orange); color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; padding: 11px 20px; cursor: pointer;
  font-family: inherit;
}
.btn-primary:active { background: var(--orange-dark); }
.btn-big { display: block; width: 100%; padding: 14px; font-size: 16px; margin-top: 16px; }
.btn-disabled { opacity: 0.4; pointer-events: none; }
.btn-secondary {
  background: var(--orange-pale); color: var(--orange-dark); border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; padding: 11px 16px; cursor: pointer; font-family: inherit;
  text-decoration: none; display: inline-block; text-align: center;
}
.btn-ghost { background: none; border: none; color: var(--ink-2); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 6px; }
.btn-link { background: none; border: none; color: var(--orange); font-weight: 700; font-size: 13.5px; cursor: pointer; font-family: inherit; }
.back { margin-bottom: 10px; }

.day-card { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.day-info { flex: 1; cursor: pointer; }
.day-name { font-size: 17px; font-weight: 800; }
.day-sub { font-size: 13px; color: var(--ink-2); margin-top: 3px; }

.act-card { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; }
.act-chev { font-size: 22px; color: var(--ink-3); font-weight: 600; }
.sess-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.sess-overall { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; color: var(--ink-2); }
.sess-chk { background: var(--bg); border-radius: 10px; padding: 8px 12px; font-size: 13px; color: var(--ink-2); margin-top: 10px; }
.sess-skip .hist-date { color: var(--ink-3); }
.sess-skip-tag { font-size: 11.5px; font-weight: 700; color: #B26F04; background: #FDF3E1; padding: 3px 8px; border-radius: 8px; }
.sess-note { color: var(--ink-3); font-size: 12px; }
.act-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); flex: none; }
.act-main { flex: 1; }
.act-title { font-size: 15px; font-weight: 700; }
.act-sub { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }

.checkin-card { border: 2px solid var(--orange); }
.checkin-q { font-size: 15px; line-height: 1.4; margin-bottom: 12px; }
.checkin-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.chk-btn {
  background: var(--bg); border: 1.5px solid var(--line); border-radius: 12px;
  font-size: 12px; font-weight: 600; padding: 10px 4px; cursor: pointer; font-family: inherit;
  color: var(--ink); line-height: 1.25;
}
.chk-btn:active { border-color: var(--orange); background: var(--orange-pale); }

.resume-card { background: var(--ink); color: #fff; }
.resume-card .card-kicker { color: #FFB48A; }
.resume-main { cursor: pointer; }
.resume-title { font-size: 15px; font-weight: 700; }
.resume-actions { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
.btn-ghost-dark { color: #B9B9C2; }

.day-next { border: 2px solid var(--orange); }
.day-badge {
  display: inline-block; vertical-align: 2px; margin-left: 6px;
  background: var(--orange); color: #fff; font-size: 10.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.5px; padding: 2.5px 8px; border-radius: 999px;
}
.day-done { font-size: 12.5px; font-weight: 700; color: var(--green); margin-top: 4px; }

.wk-top { align-items: center; }
.wk-title { font-size: 16px; font-weight: 800; }
.wk-count { color: var(--ink-3); font-weight: 600; font-size: 13px; }
.progress { height: 5px; background: var(--line); border-radius: 3px; margin-bottom: 14px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.3s; }

.ex-card { padding: 18px 16px; }
.ex-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.ex-name { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
.ex-scheme { font-size: 19px; color: var(--ink); margin-top: 5px; font-weight: 800; }
.ex-scheme .scheme-sep { color: var(--ink-3); font-weight: 600; }
.info-btn { width: 34px; height: 34px; border: none; background: var(--orange-pale); color: var(--orange-dark); border-radius: 50%; cursor: pointer; padding: 6px; flex: none; }
.info-btn svg { width: 100%; height: 100%; }
.ex-art { margin: 14px 0 4px; }
.ex-art svg { width: 100%; height: auto; display: block; }
.photo-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pp { position: relative; background: #FAF9F6; border-radius: 12px; overflow: hidden; }
.pp img { width: 100%; height: 100%; object-fit: cover; display: block; aspect-ratio: 4 / 3; }
.pp-n {
  position: absolute; top: 8px; left: 8px; z-index: 1;
  width: 22px; height: 22px; border-radius: 50%; background: var(--orange); color: #fff;
  font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center;
}

.sug-box { background: var(--orange-pale); border-radius: 12px; padding: 11px 13px; margin: 10px 0 4px; }
.sug-value { font-size: 15px; color: var(--orange-dark); }
.sug-why { font-size: 12.5px; color: #A05730; margin-top: 3px; line-height: 1.35; }
.muted-box { background: var(--bg); color: var(--ink-2); font-size: 13.5px; line-height: 1.4; }

.stepper-label { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-3); margin: 16px 0 6px; }
.stepper { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.step-btn {
  width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--line);
  background: var(--card); font-size: 26px; color: var(--ink); cursor: pointer; font-family: inherit;
  flex: none; line-height: 1;
}
.step-btn:active { background: var(--orange-pale); border-color: var(--orange); color: var(--orange-dark); }
.step-val { font-size: 34px; font-weight: 800; letter-spacing: -1px; cursor: pointer; text-align: center; }
.step-unit { font-size: 15px; font-weight: 600; color: var(--ink-3); margin-left: 5px; letter-spacing: 0; }

.bar-row { display: block; font-size: 13px; color: var(--ink-2); margin-top: 10px; cursor: pointer; }
.bar-row input { accent-color: var(--orange); margin-right: 6px; }
.bar-tot { font-weight: 700; color: var(--ink); }
.bar-kg-row { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
.bar-kg-label { font-size: 13px; color: var(--ink-2); }
.bar-kg {
  border: 1.5px solid var(--line); background: var(--bg); color: var(--ink-2);
  border-radius: 999px; padding: 7px 14px; font-size: 13.5px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.bar-kg.sel { border-color: var(--orange); background: var(--orange-pale); color: var(--orange-dark); }
.bar-kg-row .bar-tot { margin-left: auto; font-size: 13.5px; }

.timer-box { text-align: center; background: var(--bg); border-radius: 14px; padding: 16px 14px 14px; margin: 14px 0 4px; }
.timer-display {
  font-size: 58px; font-weight: 800; letter-spacing: -1px; line-height: 1;
  font-variant-numeric: tabular-nums; color: var(--ink); margin-bottom: 12px;
}
.timer-display.run { color: var(--orange); }
.timer-btn { width: 100%; padding: 13px; font-size: 16px; border-radius: 12px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-stop { background: var(--red); color: #fff; border: none; }
.btn-stop:active { background: #B33530; }
.timer-hint { margin-top: 10px; }

.feel-label { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-3); margin: 18px 0 8px; }
.feel-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.feel-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: var(--bg); border: 1.5px solid var(--line); border-radius: 14px;
  padding: 11px 4px; cursor: pointer; font-family: inherit;
  font-size: 12.5px; font-weight: 700; color: var(--ink-2);
}
.feel-btn.sel-hard { border-color: var(--red); background: #FDEDEC; color: var(--red); }
.feel-btn.sel-ok { border-color: #E8930C; background: #FDF3E1; color: #B26F04; }
.feel-btn.sel-easy { border-color: var(--green); background: #EAF6EC; color: var(--green); }

.next-row { padding: 10px 16px; color: var(--ink-2); font-size: 14px; background: var(--card); border-radius: 12px; margin-bottom: 6px; opacity: 0.75; }

.park-row { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; margin-bottom: 12px; }
.park-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--orange-pale); border: 1.5px solid var(--orange); color: var(--orange-dark);
  border-radius: 999px; padding: 6px 12px; font-size: 12.5px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.park-hint { font-size: 11.5px; color: var(--ink-3); }
.warn-box {
  display: flex; align-items: flex-start; gap: 8px;
  background: #FDF3E1; color: #8A5A06; border-radius: 12px; padding: 10px 13px;
  font-size: 13px; line-height: 1.4; margin: 10px 0 4px;
}
.warn-box svg { flex: none; margin-top: 2px; }
.park-sheet { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
.park-q { font-size: 16px; margin: 4px 2px 14px; }
.park-opt {
  display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 10px;
  width: 100%; text-align: left; background: var(--bg); border: 1.5px solid var(--line);
  border-radius: 12px; padding: 13px 14px; margin-bottom: 8px;
  font-size: 15px; font-weight: 700; color: var(--ink); cursor: pointer; font-family: inherit;
}
.park-opt:active { border-color: var(--orange); background: var(--orange-pale); }
.park-opt svg { color: var(--orange-dark); }
.park-opt-sub { font-size: 11.5px; font-weight: 500; color: var(--ink-3); }
.park-opt-skip svg { color: var(--ink-3); }
.park-cancel { display: block; margin: 4px auto 0; }
.park-reason { display: inline-flex; align-items: center; gap: 5px; }
.park-reason svg { color: var(--orange-dark); }
.recover-btns { display: flex; flex-direction: column; gap: 4px; align-items: stretch; }
.recover-btns .btn-primary { padding: 9px 16px; font-size: 14px; }
.finish-big { font-size: 24px; font-weight: 800; margin-bottom: 6px; }

textarea {
  width: 100%; border: 1.5px solid var(--line); border-radius: 12px; padding: 12px;
  font-family: inherit; font-size: 14px; resize: vertical; background: var(--bg); color: var(--ink);
}
textarea:focus { outline: none; border-color: var(--orange); background: #fff; }
.preview-box { margin-top: 14px; }
.plan-name { font-size: 16px; font-weight: 800; }
.plan-date { font-size: 12.5px; color: var(--ink-3); margin: 2px 0 6px; }
.plan-day { margin-top: 12px; }
.plan-day-name { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--orange); margin: 10px 0 6px; }
.plan-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 2px; border-bottom: 1px solid var(--line); font-size: 14.5px; cursor: pointer;
}
.plan-item:last-child { border-bottom: none; }
.plan-item.unmatched { cursor: default; }
.mini-info { width: 20px; height: 20px; color: var(--ink-3); flex: none; }
.mini-info svg { width: 100%; height: 100%; }
.badge-ok { color: var(--green); font-weight: 800; }
.badge-new { font-size: 11px; font-weight: 700; color: #B26F04; background: #FDF3E1; padding: 3px 8px; border-radius: 8px; }

.row-card { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
.row-name { font-size: 15px; font-weight: 700; }
.row-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }
.row-val { font-size: 16px; font-weight: 800; }
.trend { font-size: 12px; }
.trend.up { color: var(--green); }
.trend.down { color: var(--red); }
.spark { width: 100%; height: auto; margin: 10px 0 4px; }
.hist-list { margin-top: 8px; }
.hist-row { display: grid; grid-template-columns: 1fr auto 28px; align-items: center; gap: 10px; padding: 8px 2px; border-bottom: 1px solid var(--line); }
.hist-row:last-child { border-bottom: none; }
.hist-date { font-size: 13px; color: var(--ink-2); }
.hist-val { font-size: 14.5px; font-weight: 700; text-align: right; }
.data-row { display: flex; gap: 10px; }

.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(15,15,20,0.45); z-index: 50;
  display: flex; align-items: flex-end; justify-content: center;
}
.sheet {
  background: var(--card); border-radius: 22px 22px 0 0; width: 100%; max-width: 560px;
  max-height: 88vh; overflow-y: auto; padding: 10px 18px calc(24px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
.sheet-grip { width: 40px; height: 4.5px; background: var(--line); border-radius: 3px; margin: 4px auto 12px; }
.sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.sheet-sec { font-size: 12.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; color: var(--orange); margin: 18px 0 6px; }
.sheet-txt { font-size: 14.5px; line-height: 1.55; color: var(--ink); }
.err-box { background: #FDEDEC; color: #A5322D; border-radius: 12px; padding: 10px 13px; font-size: 13.5px; line-height: 1.45; margin-top: 10px; }
.mus-wrap { max-width: 300px; margin: 0 auto; }
.mus-wrap svg { width: 100%; height: auto; }
.mus-names { color: var(--ink-2); font-size: 13.5px; text-align: center; }
.btn-video { display: block; margin-top: 18px; }

nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: var(--card); border-top: 1px solid var(--line);
  display: flex; justify-content: space-around;
  padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--ink-3); font-size: 10.5px; font-weight: 700;
  cursor: pointer; font-family: inherit; width: 72px; padding: 2px 0;
}
.nav-btn svg { width: 24px; height: 24px; }
.nav-btn.active { color: var(--orange); }
</style>
</head>
<body>
<div id="view"></div>
<div id="sheet-host"></div>
<nav>
  <button class="nav-btn" data-tab="home" onclick="App.tab('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/></svg>Oggi</button>
  <button class="nav-btn" data-tab="workout" onclick="App.tab('workout')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="12" x2="16" y2="12"/><rect x="4.5" y="8" width="2.6" height="8" rx="1"/><rect x="16.9" y="8" width="2.6" height="8" rx="1"/><rect x="1.8" y="9.6" width="1.9" height="4.8" rx="0.9"/><rect x="20.3" y="9.6" width="1.9" height="4.8" rx="0.9"/></svg>Allenati</button>
  <button class="nav-btn" data-tab="plans" onclick="App.tab('plans')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4.5V3h6v1.5"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>Schede</button>
  <button class="nav-btn" data-tab="progress" onclick="App.tab('progress')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19 10 12l4 3.5L20 8"/><path d="M15.5 8H20v4.5"/></svg>Progressi</button>
</nav>
<script src="data.js"></script>
<script src="art.js"></script>
<script src="app.js"></script>
</body>
</html>
